<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">

    <title>Exercise 14.1</title>
</head>
<body>

    <div class="container mt-5">

        <h1 class="text-center mb-5">
            Display and Visibility Utilities
        </h1>

        <!-- Hidden on Small Screens -->
        <div class="d-none d-md-block bg-primary text-white p-4 rounded mb-4">

            <h3>
                Medium Screen Section
            </h3>

            <p>
                This section is hidden on small screens and visible on medium screens and above.
            </p>

        </div>

        <!-- Flex on Large Screens -->
        <div class="d-none d-lg-flex bg-success text-white p-4 rounded justify-content-between">

            <h3>
                Large Screen Flex Section
            </h3>

            <button class="btn btn-light">
                Click Here
            </button>

        </div>

    </div>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
