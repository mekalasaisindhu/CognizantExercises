<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">

    <title>Exercise 9.1</title>
</head>
<body>

    <div class="container mt-5">

        <h2 class="mb-4 text-center">
            Bootstrap Buttons
        </h2>

        <div class="text-center">

            <!-- Normal Buttons -->
            <button class="btn btn-primary m-2">Primary</button>

            <button class="btn btn-secondary m-2">Secondary</button>

            <button class="btn btn-success m-2">Success</button>

            <button class="btn btn-danger m-2">Danger</button>

            <button class="btn btn-warning m-2">Warning</button>

            <button class="btn btn-info m-2">Info</button>

            <button class="btn btn-dark m-2">Dark</button>

            <!-- Outline Buttons -->
            <button class="btn btn-outline-primary m-2">
                Outline Primary
            </button>

            <button class="btn btn-outline-success m-2">
                Outline Success
            </button>

            <button class="btn btn-outline-danger m-2">
                Outline Danger
            </button>

        </div>

    </div>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
