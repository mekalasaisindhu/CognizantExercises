<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">

    <title>Exercise 13.1</title>
</head>
<body>

    <div class="container mt-5">

        <h1 class="text-center mb-5">
            Dashboard Page
        </h1>

        <div class="row g-4">

            <!-- Card 1 -->
            <div class="col-md-3">

                <div class="bg-primary text-white p-4 rounded text-center">

                    <h3>Users</h3>

                    <p>1,250 Active Users</p>

                </div>

            </div>

            <!-- Card 2 -->
            <div class="col-md-3">

                <div class="bg-success text-white p-4 rounded text-center">

                    <h3>Sales</h3>

                    <p>₹50,000 Revenue</p>

                </div>

            </div>

            <!-- Card 3 -->
            <div class="col-md-3">

                <div class="bg-warning text-dark p-4 rounded text-center">

                    <h3>Orders</h3>

                    <p>320 Pending Orders</p>

                </div>

            </div>

            <!-- Card 4 -->
            <div class="col-md-3">

                <div class="bg-danger text-white p-4 rounded text-center">

                    <h3>Alerts</h3>

                    <p>5 Critical Issues</p>

                </div>

            </div>

        </div>

    </div>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
