<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">

    <title>Exercise 9.2</title>
</head>
<body>

    <div class="container mt-5 text-center">

        <h2 class="mb-4">
            Button Groups and Toggle Buttons
        </h2>

        <!-- Button Group -->
        <div class="btn-group mb-4">

            <button class="btn btn-primary">
                Left
            </button>

            <button class="btn btn-success">
                Middle
            </button>

            <button class="btn btn-danger">
                Right
            </button>

        </div>

        <br>

        <!-- Toggle Buttons -->
        <input type="checkbox" class="btn-check" id="btn1">

        <label class="btn btn-outline-primary m-2" for="btn1">
            Toggle 1
        </label>

        <input type="checkbox" class="btn-check" id="btn2">

        <label class="btn btn-outline-success m-2" for="btn2">
            Toggle 2
        </label>

        <input type="checkbox" class="btn-check" id="btn3">

        <label class="btn btn-outline-danger m-2" for="btn3">
            Toggle 3
        </label>

    </div>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
